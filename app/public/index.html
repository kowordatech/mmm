<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>leads2conv — Content Control Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F6F1; --card:#FFFFFF; --ink:#171B18; --muted:#5E6660;
    --line:#DDDFD6; --green:#0B5C3F; --green-soft:#E4EFE8; --gold:#E8A200;
    --red:#B3401E; --radius:10px;
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.5}
  header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:2px solid var(--ink);background:var(--card)}
  .brand{font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:-.02em}
  .brand span{color:var(--green)}
  .date-chip{font-family:var(--display);font-size:13px;color:var(--muted)}
  nav{display:flex;gap:4px;padding:12px 28px 0;border-bottom:1px solid var(--line)}
  nav button{font-family:var(--display);font-weight:500;font-size:14px;padding:10px 16px;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent}
  nav button.active{color:var(--green);border-bottom-color:var(--green)}
  nav button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  main{max-width:880px;margin:0 auto;padding:28px 20px 80px}
  h2{font-family:var(--display);font-size:22px;margin-bottom:4px}
  .sub{color:var(--muted);margin-bottom:22px;font-size:14px}

  /* call-sheet rows */
  .sheet{position:relative;padding-left:86px}
  .sheet::before{content:"";position:absolute;left:64px;top:8px;bottom:8px;width:2px;background:var(--line)}
  .slot{position:relative;margin-bottom:18px}
  .slot .time{position:absolute;left:-86px;top:14px;width:60px;text-align:right;font-family:var(--display);font-weight:700;font-size:15px;color:var(--green)}
  .slot::before{content:"";position:absolute;left:-24px;top:20px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--paper)}
  .slot.done .time{color:var(--muted);text-decoration:line-through}
  .slot.done::before{background:var(--muted)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
  .card .top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .chip{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:99px;background:var(--green-soft);color:var(--green)}
  .chip.wa{background:#FFF4D6;color:#8A6400}
  .chip.fmt{background:#EEF0EA;color:var(--muted)}
  .body-text{white-space:pre-wrap;font-size:14.5px;margin-bottom:10px}
  .meta{font-size:13px;color:var(--muted);margin-bottom:12px}
  .row-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--display);font-weight:500;font-size:13px;padding:8px 14px;border-radius:8px;border:1px solid var(--ink);background:var(--card);cursor:pointer}
  .btn.primary{background:var(--green);border-color:var(--green);color:#fff}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .btn:active{transform:translateY(1px)}
  label.posted{display:flex;gap:6px;align-items:center;font-size:13px;color:var(--muted);cursor:pointer;margin-left:auto}

  .empty{background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);padding:34px;text-align:center;color:var(--muted)}
  .empty .btn{margin-top:14px}

  /* calendar */
  .week-h{font-family:var(--display);font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--green);margin:26px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--green)}
  select,input,textarea{font-family:var(--body);font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);width:100%}
  textarea{min-height:70px;resize:vertical}
  .field{margin-bottom:16px}
  .field label{display:block;font-family:var(--display);font-size:13px;font-weight:500;margin-bottom:5px}
  .inline{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .inline select{width:auto}
  pre.log{background:var(--ink);color:#D9E5DD;border-radius:var(--radius);padding:16px;font-size:12.5px;overflow:auto;max-height:340px;margin-top:16px;white-space:pre-wrap}
  .banner{padding:10px 14px;border-radius:8px;font-size:13.5px;margin-bottom:18px}
  .banner.warn{background:#FFF4D6;color:#7A5800}
  .banner.offer{background:#FBE9E2;color:var(--red);font-family:var(--display);font-weight:500}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-family:var(--display);font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  @media(max-width:640px){
    .sheet{padding-left:0}.sheet::before{display:none}
    .slot .time{position:static;display:block;text-align:left;width:auto;margin-bottom:4px}
    .slot::before{display:none}
    main{padding:20px 12px 80px}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="brand">leads2conv <span>/ content desk</span></div>
  <div class="date-chip" id="todayChip"></div>
</header>
<nav>
  <button data-tab="today" class="active">Today</button>
  <button data-tab="calendar">Calendar</button>
  <button data-tab="generate">Generate</button>
  <button data-tab="settings">Settings</button>
</nav>
<main>
  <section id="tab-today"></section>
  <section id="tab-calendar" hidden></section>
  <section id="tab-generate" hidden></section>
  <section id="tab-settings" hidden></section>
</main>
<div class="toast" id="toast"></div>

<script>
const $ = (s, el=document) => el.querySelector(s);
const $$ = (s, el=document) => [...el.querySelectorAll(s)];
let state = { config:{}, months:[], hasApiKey:false, today:"" };
let posted = {};

const api = (url, opts) => fetch(url, opts).then(async r => {
  const j = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(j.error || r.statusText);
  return j;
});
const toast = (msg) => { const t=$("#toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); };

// ---- tabs ----
$$("nav button").forEach(b => b.onclick = () => {
  $$("nav button").forEach(x=>x.classList.toggle("active",x===b));
  ["today","calendar","generate","settings"].forEach(t => $("#tab-"+t).hidden = t!==b.dataset.tab);
});

// ---- rendering helpers ----
const chipClass = ch => ch.startsWith("whatsapp") ? "chip wa" : "chip";
const nice = ch => ({linkedin:"LinkedIn",facebook:"Facebook",whatsapp_status:"WA Status",whatsapp_broadcast:"WA Broadcast"}[ch]||ch);

function postCard(p, withTime){
  const key = `${p.date}|${p.channel}`;
  const done = Boolean(posted[key]);
  const div = document.createElement("div");
  div.className = "slot" + (done ? " done" : "");
  div.innerHTML = `
    ${withTime ? `<div class="time">${p.posting_time||""}</div>` : ""}
    <div class="card">
      <div class="top">
        <span class="${chipClass(p.channel)}">${nice(p.channel)}</span>
        <span class="chip fmt">${p.format||"text"}</span>
        ${!withTime ? `<span class="chip fmt">${p.date} · ${p.posting_time||""}</span>` : ""}
      </div>
      <div class="body-text"></div>
      ${p.hashtags && p.hashtags.length ? `<div class="meta">${p.hashtags.join(" ")}</div>` : ""}
      ${p.graphic_brief ? `<div class="meta">🎨 Graphic: ${p.graphic_brief}</div>` : ""}
      <div class="row-actions">
        <button class="btn primary" data-copy>Copy post</button>
        ${p.hashtags && p.hashtags.length ? `<button class="btn" data-copy-tags>Copy + hashtags</button>` : ""}
        <label class="posted"><input type="checkbox" ${done?"checked":""}> Posted</label>
      </div>
    </div>`;
  $(".body-text", div).textContent = p.body;
  $("[data-copy]", div).onclick = () => { navigator.clipboard.writeText(p.body); toast("Post copied"); };
  const tagsBtn = $("[data-copy-tags]", div);
  if (tagsBtn) tagsBtn.onclick = () => { navigator.clipboard.writeText(p.body + "\n\n" + p.hashtags.join(" ")); toast("Post + hashtags copied"); };
  $("input", div).onchange = async (e) => {
    await api("/api/posted",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key,done:e.target.checked})});
    div.classList.toggle("done", e.target.checked);
  };
  return div;
}

function allPosts(cal){ return (cal.weeks||[]).flatMap(w => (w.posts||[]).map(p => ({...p,_week:w}))); }

// ---- Today ----
async function renderToday(){
  const el = $("#tab-today");
  el.innerHTML = `<h2>Today's call sheet</h2><p class="sub">Copy, post at the listed time, tick it off.</p>`;
  const month = state.today.slice(0,7);
  let cal;
  try { cal = await api("/api/calendar/"+month); }
  catch { el.innerHTML += `<div class="empty">No calendar for ${month} yet.<br><button class="btn primary" onclick="document.querySelector('[data-tab=generate]').click()">Generate it</button></div>`; return; }

  if (cal.offer_needed_by && new Date(cal.offer_needed_by) >= new Date(state.today))
    el.innerHTML += `<div class="banner offer">⭐ Close Week offer still undecided — set it in Settings by ${cal.offer_needed_by}, then regenerate or hand-edit Week 4.</div>`;

  const todays = allPosts(cal).filter(p => p.date === state.today)
    .sort((a,b)=>(a.posting_time||"").localeCompare(b.posting_time||""));
  if (!todays.length){ el.innerHTML += `<div class="empty">Nothing scheduled today. Enjoy the quiet — or check the Calendar tab.</div>`; return; }

  const sheet = document.createElement("div"); sheet.className="sheet";
  todays.forEach(p => sheet.appendChild(postCard(p, true)));
  el.appendChild(sheet);
}

// ---- Calendar ----
async function renderCalendar(){
  const el = $("#tab-calendar");
  el.innerHTML = `<h2>Month view</h2><p class="sub">Every post for the month, grouped by week.</p>`;
  if (!state.months.length){ el.innerHTML += `<div class="empty">No calendars generated yet.</div>`; return; }
  const sel = document.createElement("select"); sel.style.maxWidth="220px"; sel.style.marginBottom="10px";
  state.months.forEach(m => sel.appendChild(new Option(m,m)));
  el.appendChild(sel);
  const holder = document.createElement("div"); el.appendChild(holder);
  const load = async () => {
    const cal = await api("/api/calendar/"+sel.value);
    holder.innerHTML = cal.theme ? `<p class="sub" style="margin-top:8px">“${cal.theme}”</p>` : "";
    (cal.weeks||[]).forEach(w => {
      const h = document.createElement("div"); h.className="week-h";
      h.textContent = `Week ${w.week_number} — ${w.theme||""}`;
      holder.appendChild(h);
      (w.posts||[]).forEach(p => holder.appendChild(postCard(p,false)));
    });
  };
  sel.onchange = load; await load();
}

// ---- Generate ----
function renderGenerate(){
  const el = $("#tab-generate");
  el.innerHTML = `
    <h2>Generate a calendar</h2>
    <p class="sub">Two API calls: content generation, then a QA review pass. Takes about a minute.</p>
    ${state.hasApiKey ? "" : `<div class="banner warn">ANTHROPIC_API_KEY isn't set in the terminal running this server — only dry runs will work. Set it, restart the server, and refresh.</div>`}
    <div class="inline" style="margin-bottom:14px">
      <select id="genTarget">
        <option value="next">Next month</option>
        <option value="this">This month</option>
      </select>
      <button class="btn primary" id="genBtn">Generate calendar</button>
      <button class="btn" id="dryBtn">Dry run (free — preview the prompt)</button>
    </div>
    <pre class="log" id="genLog" hidden></pre>`;
  const run = async (payload) => {
    const log = $("#genLog"); log.hidden = false; log.textContent = "Running…";
    $("#genBtn").disabled = $("#dryBtn").disabled = true;
    try {
      const r = await api("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      log.textContent = r.log || "(no output)";
      if (r.ok && !payload.dryRun){ toast("Calendar generated"); await loadState(); renderToday(); renderCalendar(); }
    } catch(e){ log.textContent = "Error: " + e.message; }
    $("#genBtn").disabled = $("#dryBtn").disabled = false;
  };
  $("#genBtn").onclick = () => run({ thisMonth: $("#genTarget").value === "this" });
  $("#dryBtn").onclick = () => run({ dryRun:true });
}

// ---- Settings ----
function renderSettings(){
  const el = $("#tab-settings"); const c = state.config;
  el.innerHTML = `
    <h2>Settings</h2>
    <p class="sub">Saved to config.json — the next generation uses these values.</p>
    <div class="field"><label for="sWa">WhatsApp number (goes into CTAs)</label><input id="sWa" value=""></div>
    <div class="field"><label for="sOffer">This month's Close Week offer ("TBD" if undecided)</label><input id="sOffer" value=""></div>
    <div class="field"><label for="sCtx">Seasonal context ("auto" = picked for you per month)</label><input id="sCtx" value=""></div>
    <div class="field"><label for="sExtra">Extra instructions (testimonials, launches, last month's results)</label><textarea id="sExtra"></textarea></div>
    <button class="btn primary" id="saveBtn">Save settings</button>`;
  $("#sWa").value = c.whatsappNumber||""; $("#sOffer").value = c.offer||"";
  $("#sCtx").value = c.context||"auto"; $("#sExtra").value = c.extra||"";
  $("#saveBtn").onclick = async () => {
    const body = { whatsappNumber:$("#sWa").value, offer:$("#sOffer").value, context:$("#sCtx").value, extra:$("#sExtra").value };
    const r = await api("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    state.config = r.config; toast("Settings saved");
  };
}

// ---- boot ----
async function loadState(){
  state = await api("/api/state");
  posted = await api("/api/posted");
  $("#todayChip").textContent = new Date(state.today+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
(async () => {
  await loadState();
  renderToday(); renderCalendar(); renderGenerate(); renderSettings();
})();
</script>
</body>
</html>
